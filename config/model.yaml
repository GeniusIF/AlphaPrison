dataset:
  adjust: qfq
  target: future_return_5d
  train_ratio: 0.7
  valid_ratio: 0.15

lightgbm:
  objective: regression
  n_estimators: 300
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

factor_analysis:
  quantiles: 5
  min_stocks_per_date: 5

baseline:
  ridge_alpha: 1.0

rolling_validation:
  train_window: 252
  test_window: 63
  step: 63
  min_train_rows: 200

artifacts:
  model_dir: artifacts/models
  report_dir: artifacts/reports
