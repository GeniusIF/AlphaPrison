dataset:
  adjust: qfq
  target: future_return_5d
  train_ratio: 0.7
  valid_ratio: 0.15

lightgbm:
  objective: regression
  n_estimators: 300
  learning_rate: 0.03
  num_leaves: 31
  max_depth: -1
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.0
  reg_lambda: 1.0
  random_state: 42
  n_jobs: -1

artifacts:
  model_dir: artifacts/models
  report_dir: artifacts/reports
